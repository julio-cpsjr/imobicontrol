server:
  port: 8080

spring:
  application:
      name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: myproperty-service
              uri: http://myproperty:8083
              predicates:
                - Path=/myproperty/**
              filters:
                - name: StripPrefix
                  args:
                    parts: 1

            - id: rentals-service
              uri: http://rentals:8082
              predicates:
                - Path=/rentals/**
              filters:
                - name: StripPrefix
                  args:
                    parts: 1

            - id: users-service
              uri: http://users:8081
              predicates:
                - Path=/users/**
              filters:
                - name: StripPrefix
                  args:
                    parts: 1

springdoc:
  swagger-ui:
    urls:
      - name: Users Service
        url: /users/v3/api-docs
      - name: Rentals Service
        url: /rentals/v3/api-docs
      - name: Myproperty Service
        url: /myproperty/v3/api-docs
